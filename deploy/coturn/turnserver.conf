# coturn configuration for etdmnet
#
# Authoritative reference: https://github.com/coturn/coturn/blob/master/examples/etc/turnserver.conf
#
# Anything you set in this file can be overridden via CLI flags in
# docker-compose.yml. Realm, secret and external IP are passed via CLI so they
# stay out of the image.

# Standard TURN ports
listening-port=3478
tls-listening-port=5349

# Use ephemeral UDP allocations for relay (default kernel range; widen if needed)
min-port=49152
max-port=65535

# Authentication: REST-style time-limited credentials (HMAC-SHA1).
# Pair with the same secret in your backend's credential issuer.
use-auth-secret

# Long-term-credential mechanism (required for REST-style auth too).
lt-cred-mech

# TLS for TURNS (mount real certs in /etc/coturn/certs from docker-compose).
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem
# Disable older TLS versions.
no-tlsv1
no-tlsv1_1

# Anti-loopback / anti-LAN-scan protections.
no-multicast-peers
no-cli           # disable the unauthenticated telnet CLI by default

# Quotas (tune for your traffic).
user-quota=12      # max concurrent allocations per user
total-quota=1200   # global cap

# Logging
log-file=stdout
verbose
