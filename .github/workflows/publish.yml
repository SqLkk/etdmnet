name: Publish

# Triggered when a release tag (vX.Y.Z or vX.Y.Z-beta) is pushed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required for publishing to GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Run unit tests before publishing — never push a broken release.
      - name: Run tests
        run: gradle :core:test --no-daemon

      # Publish to GitHub Packages. The auto-provisioned GITHUB_TOKEN has
      # write access for packages in this repo (see permissions block above).
      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          gradle \
            :core:publishReleasePublicationToGitHubPackagesRepository \
            :signaling-ktor:publishReleasePublicationToGitHubPackagesRepository \
            :transport-webrtc-jvm:publishReleasePublicationToGitHubPackagesRepository \
            :turn-bundled:publishReleasePublicationToGitHubPackagesRepository \
            --no-daemon --stacktrace

      # Optional: publish to Maven Central via the new Central Portal.
      # Only runs when the four required secrets are present. The legacy
      # s01.oss.sonatype.org endpoint was sunset on 2025-06-30 (returns HTTP
      # 402); the URL in build.gradle.kts now targets central.sonatype.com.
      - name: Publish to Maven Central (optional)
        if: ${{ env.OSSRH_USERNAME != '' && env.SIGNING_KEY != '' }}
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          gradle \
            :core:publishReleasePublicationToSonatypeRepository \
            :signaling-ktor:publishReleasePublicationToSonatypeRepository \
            :transport-webrtc-jvm:publishReleasePublicationToSonatypeRepository \
            :turn-bundled:publishReleasePublicationToSonatypeRepository \
            --no-daemon --stacktrace || echo "Maven Central publish skipped/failed — see logs."
